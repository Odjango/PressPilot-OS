<!-- wp:group {"align":"full","style":{"spacing":{"padding":{"top":"var:preset|spacing|70","bottom":"var:preset|spacing|70","left":"var:preset|spacing|50","right":"var:preset|spacing|50"}}},"layout":{"type":"constrained"}} -->
<div class="wp-block-group alignfull" style="background-color:#f8fafc;padding-top:var(--wp--preset--spacing--70);padding-right:var(--wp--preset--spacing--50);padding-bottom:var(--wp--preset--spacing--70);padding-left:var(--wp--preset--spacing--50)">
    <!-- wp:columns {"verticalAlignment":"center","style":{"spacing":{"blockGap":{"left":"var:preset|spacing|60"}}}} -->
    <div class="wp-block-columns are-vertically-aligned-center">
        <!-- wp:column {"verticalAlignment":"center","width":"50%"} -->
        <div class="wp-block-column is-vertically-aligned-center" style="flex-basis:50%">
            <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem","fontWeight":"600"},"spacing":{"margin":{"bottom":"var:preset|spacing|20"}}}} -->
            <p style="color:{{color_accent}};font-size:0.875rem;font-weight:600;margin-bottom:var(--wp--preset--spacing--20)">★★★★★ Rated 4.9/5</p>
            <!-- /wp:paragraph -->

            <!-- wp:heading {"level":1,"style":{"typography":{"fontSize":"clamp(2rem, 4vw, 3rem)","fontWeight":"700","lineHeight":"1.2"}}} -->
            <h1 class="wp-block-heading" style="color:{{color_text}};font-size:clamp(2rem, 4vw, 3rem);font-weight:700;line-height:1.2">{{headline}}</h1>
            <!-- /wp:heading -->

            <!-- wp:paragraph {"style":{"typography":{"fontSize":"1.125rem","lineHeight":"1.7"},"spacing":{"margin":{"top":"var:preset|spacing|20"}}}} -->
            <p style="color:{{color_secondary}};margin-top:var(--wp--preset--spacing--20);font-size:1.125rem;line-height:1.7">{{subheadline}}</p>
            <!-- /wp:paragraph -->

            <!-- wp:group {"style":{"spacing":{"margin":{"top":"var:preset|spacing|30"}}},"layout":{"type":"flex","flexWrap":"wrap"}} -->
            <div class="wp-block-group" style="margin-top:var(--wp--preset--spacing--30)">
                <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem"},"spacing":{"padding":{"top":"0.5rem","bottom":"0.5rem","left":"1rem","right":"1rem"}},"border":{"radius":"50px"}}} -->
                <p style="background-color:#e0f2fe;color:#0369a1;font-size:0.875rem;padding:0.5rem 1rem;border-radius:50px">✓ Free Shipping</p>
                <!-- /wp:paragraph -->
                <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem"},"spacing":{"padding":{"top":"0.5rem","bottom":"0.5rem","left":"1rem","right":"1rem"}},"border":{"radius":"50px"}}} -->
                <p style="background-color:#dcfce7;color:#15803d;font-size:0.875rem;padding:0.5rem 1rem;border-radius:50px">✓ 30-Day Returns</p>
                <!-- /wp:paragraph -->
                <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem"},"spacing":{"padding":{"top":"0.5rem","bottom":"0.5rem","left":"1rem","right":"1rem"}},"border":{"radius":"50px"}}} -->
                <p style="background-color:#fef3c7;color:#b45309;font-size:0.875rem;padding:0.5rem 1rem;border-radius:50px">✓ Secure Checkout</p>
                <!-- /wp:paragraph -->
            </div>
            <!-- /wp:group -->

            <!-- wp:buttons {"style":{"spacing":{"margin":{"top":"var:preset|spacing|40"}}}} -->
            <div class="wp-block-buttons" style="margin-top:var(--wp--preset--spacing--40)">
                <!-- wp:button {"style":{"typography":{"fontWeight":"600","fontSize":"1rem"},"border":{"radius":"8px"},"spacing":{"padding":{"top":"1rem","bottom":"1rem","left":"2rem","right":"2rem"}}}} -->
                <div class="wp-block-button" style="font-size:1rem;font-weight:600"><a class="wp-block-button__link wp-element-button" style="background-color:{{color_primary}};color:#ffffff;border-radius:8px;padding-top:1rem;padding-right:2rem;padding-bottom:1rem;padding-left:2rem">{{cta_text}}</a></div>
                <!-- /wp:button -->

                <!-- wp:button {"className":"is-style-outline","style":{"typography":{"fontWeight":"600","fontSize":"1rem"},"border":{"radius":"8px","width":"2px"},"spacing":{"padding":{"top":"1rem","bottom":"1rem","left":"2rem","right":"2rem"}}}} -->
                <div class="wp-block-button is-style-outline" style="font-size:1rem;font-weight:600"><a class="wp-block-button__link wp-element-button" style="color:{{color_text}};border-color:{{color_text}};border-width:2px;border-style:solid;border-radius:8px;padding-top:1rem;padding-right:2rem;padding-bottom:1rem;padding-left:2rem;background:transparent">{{secondary_cta}}</a></div>
                <!-- /wp:button -->
            </div>
            <!-- /wp:buttons -->
        </div>
        <!-- /wp:column -->

        <!-- wp:column {"verticalAlignment":"center","width":"50%"} -->
        <div class="wp-block-column is-vertically-aligned-center" style="flex-basis:50%">
            <!-- wp:image {"sizeSlug":"large","style":{"border":{"radius":"24px"}}} -->
            <figure class="wp-block-image size-large has-custom-border"><img src="{{hero_image}}" alt="{{business_name}}" style="border-radius:24px"/></figure>
            <!-- /wp:image -->
        </div>
        <!-- /wp:column -->
    </div>
    <!-- /wp:columns -->
</div>
<!-- /wp:group -->
