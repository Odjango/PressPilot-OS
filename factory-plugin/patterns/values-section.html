<!-- wp:group {"align":"full","style":{"spacing":{"padding":{"top":"var:preset|spacing|80","bottom":"var:preset|spacing|80","left":"var:preset|spacing|50","right":"var:preset|spacing|50"}}},"backgroundColor":"primary","textColor":"base","layout":{"type":"constrained"}} -->
<div class="wp-block-group alignfull has-primary-background-color has-base-color has-text-color has-background" style="padding-top:var(--wp--preset--spacing--80);padding-right:var(--wp--preset--spacing--50);padding-bottom:var(--wp--preset--spacing--80);padding-left:var(--wp--preset--spacing--50)">
    <!-- wp:heading {"textAlign":"center","level":2,"style":{"typography":{"fontSize":"2.5rem","fontWeight":"700"},"spacing":{"margin":{"bottom":"var:preset|spacing|30"}}}} -->
    <h2 class="wp-block-heading has-text-align-center" style="margin-bottom:var(--wp--preset--spacing--30);font-size:2.5rem;font-weight:700">{{values_title}}</h2>
    <!-- /wp:heading -->

    <!-- wp:paragraph {"align":"center","style":{"spacing":{"margin":{"bottom":"var:preset|spacing|60"}},"color":{"text":"#ffffffcc"}}} -->
    <p class="has-text-align-center" style="color:#ffffffcc;margin-bottom:var(--wp--preset--spacing--60)">{{values_subtitle}}</p>
    <!-- /wp:paragraph -->

    <!-- wp:columns {"style":{"spacing":{"blockGap":{"left":"var:preset|spacing|40"}}}} -->
    <div class="wp-block-columns">
        {{#values_items}}
        <!-- wp:column {"style":{"spacing":{"padding":{"top":"var:preset|spacing|50","bottom":"var:preset|spacing|50","left":"var:preset|spacing|40","right":"var:preset|spacing|40"}},"border":{"radius":"12px"}},"backgroundColor":"base"} -->
        <div class="wp-block-column has-base-background-color has-background" style="border-radius:12px;padding-top:var(--wp--preset--spacing--50);padding-right:var(--wp--preset--spacing--40);padding-bottom:var(--wp--preset--spacing--50);padding-left:var(--wp--preset--spacing--40)">
            <!-- wp:paragraph {"align":"center","style":{"typography":{"fontSize":"3rem"},"spacing":{"margin":{"bottom":"var:preset|spacing|20"}}}} -->
            <p class="has-text-align-center" style="margin-bottom:var(--wp--preset--spacing--20);font-size:3rem">{{icon}}</p>
            <!-- /wp:paragraph -->

            <!-- wp:heading {"textAlign":"center","level":3,"style":{"typography":{"fontSize":"1.5rem","fontWeight":"600"},"spacing":{"margin":{"bottom":"var:preset|spacing|20"}}},"textColor":"primary"} -->
            <h3 class="wp-block-heading has-text-align-center has-primary-color has-text-color" style="margin-bottom:var(--wp--preset--spacing--20);font-size:1.5rem;font-weight:600">{{title}}</h3>
            <!-- /wp:heading -->

            <!-- wp:paragraph {"align":"center","textColor":"secondary"} -->
            <p class="has-text-align-center has-secondary-color has-text-color">{{description}}</p>
            <!-- /wp:paragraph -->
        </div>
        <!-- /wp:column -->
        {{/values_items}}
    </div>
    <!-- /wp:columns -->
</div>
<!-- /wp:group -->
