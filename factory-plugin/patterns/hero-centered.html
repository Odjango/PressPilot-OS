<div class="wp-block-group alignfull has-background" style="background-color:{{color_primary}};padding-top:var(--wp--preset--spacing--80);padding-right:var(--wp--preset--spacing--50);padding-bottom:var(--wp--preset--spacing--80);padding-left:var(--wp--preset--spacing--50);min-height:70vh">

    <div class="wp-block-group">
        <!-- wp:heading {"textAlign":"center","level":1,"style":{"typography":{"fontSize":"clamp(2.5rem, 5vw, 4rem)","fontWeight":"700","lineHeight":"1.1"},"color":{"text":"{{color_primary_text}}"}}} -->

        <div class="wp-block-buttons" style="margin-top:var(--wp--preset--spacing--40)">
