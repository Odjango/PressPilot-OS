<!-- wp:group {"align":"full","style":{"spacing":{"padding":{"top":"var:preset|spacing|80","bottom":"var:preset|spacing|80","left":"var:preset|spacing|50","right":"var:preset|spacing|50"}}},"layout":{"type":"constrained"}} -->
<div class="wp-block-group alignfull" style="background-color:{{color_background}};padding-top:var(--wp--preset--spacing--80);padding-right:var(--wp--preset--spacing--50);padding-bottom:var(--wp--preset--spacing--80);padding-left:var(--wp--preset--spacing--50);min-height:85vh;display:flex;align-items:center">
    <!-- wp:group {"layout":{"type":"constrained","contentSize":"1100px"}} -->
    <div class="wp-block-group">
        <!-- wp:group {"layout":{"type":"flex","flexWrap":"nowrap","justifyContent":"space-between","verticalAlignment":"top"}} -->
        <div class="wp-block-group">
            <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem","fontWeight":"600","textTransform":"uppercase","letterSpacing":"0.15em"}}} -->
            <p style="color:{{color_secondary}};font-size:0.875rem;font-weight:600;text-transform:uppercase;letter-spacing:0.15em">Digital Agency</p>
            <!-- /wp:paragraph -->

            <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem"}}} -->
            <p style="color:{{color_secondary}};font-size:0.875rem">Est. 2024</p>
            <!-- /wp:paragraph -->
        </div>
        <!-- /wp:group -->

        <!-- wp:heading {"level":1,"style":{"typography":{"fontSize":"clamp(3rem, 8vw, 7rem)","fontWeight":"700","lineHeight":"1.0","letterSpacing":"-0.03em"},"spacing":{"margin":{"top":"var:preset|spacing|40"}}}} -->
        <h1 class="wp-block-heading" style="color:{{color_text}};margin-top:var(--wp--preset--spacing--40);font-size:clamp(3rem, 8vw, 7rem);font-weight:700;line-height:1.0;letter-spacing:-0.03em">{{headline}}</h1>
        <!-- /wp:heading -->

        <!-- wp:columns {"style":{"spacing":{"margin":{"top":"var:preset|spacing|50"}}}} -->
        <div class="wp-block-columns" style="margin-top:var(--wp--preset--spacing--50)">
            <!-- wp:column {"width":"60%"} -->
            <div class="wp-block-column" style="flex-basis:60%">
                <!-- wp:paragraph {"style":{"typography":{"fontSize":"1.25rem","lineHeight":"1.7"}}} -->
                <p style="color:{{color_secondary}};font-size:1.25rem;line-height:1.7">{{subheadline}}</p>
                <!-- /wp:paragraph -->

                <!-- wp:buttons {"style":{"spacing":{"margin":{"top":"var:preset|spacing|40"}}}} -->
                <div class="wp-block-buttons" style="margin-top:var(--wp--preset--spacing--40)">
                    <!-- wp:button {"style":{"typography":{"fontWeight":"600"},"border":{"radius":"0","width":"2px"},"spacing":{"padding":{"top":"1rem","bottom":"1rem","left":"2rem","right":"2rem"}}}} -->
                    <div class="wp-block-button" style="font-weight:600"><a class="wp-block-button__link wp-element-button" style="background-color:{{color_text}};color:{{color_background}};border-radius:0;padding-top:1rem;padding-right:2rem;padding-bottom:1rem;padding-left:2rem">{{cta_text}}</a></div>
                    <!-- /wp:button -->

                    <!-- wp:button {"className":"is-style-outline","style":{"typography":{"fontWeight":"600"},"border":{"radius":"0","width":"2px"},"spacing":{"padding":{"top":"1rem","bottom":"1rem","left":"2rem","right":"2rem"}}}} -->
                    <div class="wp-block-button is-style-outline" style="font-weight:600"><a class="wp-block-button__link wp-element-button" style="color:{{color_text}};border-color:{{color_text}};border-width:2px;border-style:solid;border-radius:0;padding-top:1rem;padding-right:2rem;padding-bottom:1rem;padding-left:2rem;background:transparent">{{secondary_cta}}</a></div>
                    <!-- /wp:button -->
                </div>
                <!-- /wp:buttons -->
            </div>
            <!-- /wp:column -->

            <!-- wp:column {"width":"40%"} -->
            <div class="wp-block-column" style="flex-basis:40%">
                <!-- wp:group {"layout":{"type":"flex","orientation":"vertical","justifyContent":"right"}} -->
                <div class="wp-block-group" style="text-align:right">
                    <!-- wp:paragraph {"style":{"typography":{"fontSize":"3rem","fontWeight":"700"}}} -->
                    <p style="color:{{color_primary}};font-size:3rem;font-weight:700;margin-bottom:0">150+</p>
                    <!-- /wp:paragraph -->
                    <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem","textTransform":"uppercase","letterSpacing":"0.1em"}}} -->
                    <p style="color:{{color_secondary}};font-size:0.875rem;text-transform:uppercase;letter-spacing:0.1em">Projects Delivered</p>
                    <!-- /wp:paragraph -->
                </div>
                <!-- /wp:group -->
            </div>
            <!-- /wp:column -->
        </div>
        <!-- /wp:columns -->
    </div>
    <!-- /wp:group -->
</div>
<!-- /wp:group -->
