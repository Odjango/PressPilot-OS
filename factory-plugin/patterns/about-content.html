<!-- wp:group {"align":"full","style":{"spacing":{"padding":{"top":"var:preset|spacing|80","bottom":"var:preset|spacing|80","left":"var:preset|spacing|50","right":"var:preset|spacing|50"}},"color":{"background":"{{color_background}}"}},"layout":{"type":"constrained"}} -->
<div class="wp-block-group alignfull has-background" style="background-color:{{color_background}};padding-top:var(--wp--preset--spacing--80);padding-right:var(--wp--preset--spacing--50);padding-bottom:var(--wp--preset--spacing--80);padding-left:var(--wp--preset--spacing--50)">
    <!-- wp:columns {"verticalAlignment":"center","style":{"spacing":{"blockGap":{"left":"var:preset|spacing|60"}}}} -->
    <div class="wp-block-columns are-vertically-aligned-center">
        <!-- wp:column {"verticalAlignment":"center","width":"55%"} -->
        <div class="wp-block-column is-vertically-aligned-center" style="flex-basis:55%">
            <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem","fontWeight":"600","textTransform":"uppercase","letterSpacing":"0.1em"},"color":{"text":"{{color_primary}}"}}} -->
            <p class="has-text-color" style="color:{{color_primary}};font-size:0.875rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase">About Us</p>
            <!-- /wp:paragraph -->

            <!-- wp:heading {"level":2,"style":{"typography":{"fontSize":"2.5rem","fontWeight":"700","lineHeight":"1.2"},"spacing":{"margin":{"top":"var:preset|spacing|20"}},"color":{"text":"{{color_text}}"}}} -->
            <h2 class="wp-block-heading has-text-color" style="color:{{color_text}};margin-top:var(--wp--preset--spacing--20);font-size:2.5rem;font-weight:700;line-height:1.2">{{about_title}}</h2>
            <!-- /wp:heading -->

            <!-- wp:paragraph {"style":{"typography":{"fontSize":"1.125rem","lineHeight":"1.8"},"spacing":{"margin":{"top":"var:preset|spacing|30"}},"color":{"text":"{{color_secondary}}"}}} -->
            <p class="has-text-color" style="color:{{color_secondary}};margin-top:var(--wp--preset--spacing--30);font-size:1.125rem;line-height:1.8">{{about_text}}</p>
            <!-- /wp:paragraph -->

            <!-- wp:paragraph {"style":{"typography":{"fontSize":"1.125rem","lineHeight":"1.8"},"spacing":{"margin":{"top":"var:preset|spacing|20"}},"color":{"text":"{{color_secondary}}"}}} -->
            <p class="has-text-color" style="color:{{color_secondary}};margin-top:var(--wp--preset--spacing--20);font-size:1.125rem;line-height:1.8">{{description}}</p>
            <!-- /wp:paragraph -->

            <!-- wp:buttons {"style":{"spacing":{"margin":{"top":"var:preset|spacing|40"}}}} -->
            <div class="wp-block-buttons" style="margin-top:var(--wp--preset--spacing--40)">
                <!-- wp:button {"style":{"typography":{"fontWeight":"600"},"border":{"radius":"6px"},"spacing":{"padding":{"top":"1rem","bottom":"1rem","left":"2rem","right":"2rem"}},"color":{"background":"{{color_primary}}","text":"#ffffff"}}} -->
                <div class="wp-block-button" style="font-weight:600"><a class="wp-block-button__link has-text-color has-background wp-element-button" style="background-color:{{color_primary}};color:#ffffff;border-radius:6px;padding-top:1rem;padding-right:2rem;padding-bottom:1rem;padding-left:2rem">{{cta_text}}</a></div>
                <!-- /wp:button -->
            </div>
            <!-- /wp:buttons -->
        </div>
        <!-- /wp:column -->

        <!-- wp:column {"verticalAlignment":"center","width":"45%"} -->
        <div class="wp-block-column is-vertically-aligned-center" style="flex-basis:45%">
            <!-- wp:image {"sizeSlug":"large","linkDestination":"none","style":{"border":{"radius":"16px"}}} -->
            <figure class="wp-block-image size-large has-custom-border"><img src="{{about_image}}" alt="About {{business_name}}" style="border-radius:16px"/></figure>
            <!-- /wp:image -->
        </div>
        <!-- /wp:column -->
    </div>
    <!-- /wp:columns -->
</div>
<!-- /wp:group -->
