<!-- wp:group {"align":"full","style":{"spacing":{"padding":{"top":"0","bottom":"0","left":"0","right":"0"}}},"layout":{"type":"constrained"}} -->
<div class="wp-block-group alignfull" style="padding:0;position:relative;min-height:80vh;display:flex;align-items:center">
    <!-- Background Image Overlay -->
    <div style="position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(to right, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 100%);z-index:1"></div>
    <div style="position:absolute;top:0;left:0;right:0;bottom:0;background-image:url('{{hero_image}}');background-size:cover;background-position:center;z-index:0"></div>

    <!-- wp:group {"style":{"spacing":{"padding":{"top":"var:preset|spacing|80","bottom":"var:preset|spacing|80","left":"var:preset|spacing|50","right":"var:preset|spacing|50"}}},"layout":{"type":"constrained","contentSize":"600px","justifyContent":"left"}} -->
    <div class="wp-block-group" style="position:relative;z-index:2;padding-top:var(--wp--preset--spacing--80);padding-right:var(--wp--preset--spacing--50);padding-bottom:var(--wp--preset--spacing--80);padding-left:var(--wp--preset--spacing--50)">
        <!-- wp:paragraph {"style":{"typography":{"fontSize":"1rem","fontWeight":"600","letterSpacing":"0.1em","textTransform":"uppercase"}}} -->
        <p style="color:{{color_accent}};font-size:1rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase">{{tagline}}</p>
        <!-- /wp:paragraph -->

        <!-- wp:heading {"level":1,"style":{"typography":{"fontSize":"clamp(2.5rem, 6vw, 4.5rem)","fontWeight":"700","lineHeight":"1.1"},"spacing":{"margin":{"top":"var:preset|spacing|20"}}}} -->
        <h1 class="wp-block-heading" style="color:#ffffff;margin-top:var(--wp--preset--spacing--20);font-size:clamp(2.5rem, 6vw, 4.5rem);font-weight:700;line-height:1.1">{{headline}}</h1>
        <!-- /wp:heading -->

        <!-- wp:paragraph {"style":{"typography":{"fontSize":"1.25rem"},"spacing":{"margin":{"top":"var:preset|spacing|20"}}}} -->
        <p style="color:#ffffffcc;margin-top:var(--wp--preset--spacing--20);font-size:1.25rem">{{subheadline}}</p>
        <!-- /wp:paragraph -->

        <!-- wp:buttons {"style":{"spacing":{"margin":{"top":"var:preset|spacing|40"}}}} -->
        <div class="wp-block-buttons" style="margin-top:var(--wp--preset--spacing--40)">
            <!-- wp:button {"style":{"typography":{"fontWeight":"600"},"border":{"radius":"6px"},"spacing":{"padding":{"top":"1rem","bottom":"1rem","left":"2rem","right":"2rem"}}}} -->
            <div class="wp-block-button" style="font-weight:600"><a class="wp-block-button__link wp-element-button" style="background-color:{{color_accent}};color:{{color_accent_text}};border-radius:6px;padding-top:1rem;padding-right:2rem;padding-bottom:1rem;padding-left:2rem">{{cta_text}}</a></div>
            <!-- /wp:button -->

            <!-- wp:button {"className":"is-style-outline","style":{"typography":{"fontWeight":"600"},"border":{"radius":"6px","width":"2px"},"spacing":{"padding":{"top":"1rem","bottom":"1rem","left":"2rem","right":"2rem"}}}} -->
            <div class="wp-block-button is-style-outline" style="font-weight:600"><a class="wp-block-button__link wp-element-button" style="color:#ffffff;border-color:#ffffff;border-width:2px;border-style:solid;border-radius:6px;padding-top:1rem;padding-right:2rem;padding-bottom:1rem;padding-left:2rem;background:transparent">View Menu</a></div>
            <!-- /wp:button -->
        </div>
        <!-- /wp:buttons -->

        <!-- wp:group {"style":{"spacing":{"margin":{"top":"var:preset|spacing|40"}}},"layout":{"type":"flex","flexWrap":"wrap"}} -->
        <div class="wp-block-group" style="margin-top:var(--wp--preset--spacing--40)">
            <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem"}}} -->
            <p style="color:#ffffffaa;font-size:0.875rem">📍 {{address}}</p>
            <!-- /wp:paragraph -->
            <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem"}}} -->
            <p style="color:#ffffffaa;font-size:0.875rem">📞 {{phone}}</p>
            <!-- /wp:paragraph -->
        </div>
        <!-- /wp:group -->
    </div>
    <!-- /wp:group -->
</div>
<!-- /wp:group -->
