<!-- wp:cover {"url":"{{hero_image}}","dimRatio":70,"overlayColor":"black","isUserOverlayColor":true,"minHeight":80,"minHeightUnit":"vh","align":"full","style":{"spacing":{"padding":{"top":"var:preset|spacing|80","bottom":"var:preset|spacing|80","left":"var:preset|spacing|50","right":"var:preset|spacing|50"}}}} -->
<div class="wp-block-cover alignfull" style="min-height:80vh;padding-top:var(--wp--preset--spacing--80);padding-right:var(--wp--preset--spacing--50);padding-bottom:var(--wp--preset--spacing--80);padding-left:var(--wp--preset--spacing--50)">
    <span aria-hidden="true" class="wp-block-cover__background has-black-background-color has-background-dim-70 has-background-dim"></span>
    <img class="wp-block-cover__image-background" alt="" src="{{hero_image}}" data-object-fit="cover"/>
    <div class="wp-block-cover__inner-container">
        <!-- wp:group {"layout":{"type":"constrained","contentSize":"600px","justifyContent":"left"}} -->
        <div class="wp-block-group">
            <!-- wp:paragraph {"style":{"typography":{"fontSize":"1rem","fontWeight":"600","letterSpacing":"0.1em","textTransform":"uppercase"},"color":{"text":"{{color_accent}}"}}} -->
            <p class="has-text-color" style="color:{{color_accent}};font-size:1rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase">{{tagline}}</p>
            <!-- /wp:paragraph -->

            <!-- wp:heading {"level":1,"style":{"typography":{"fontSize":"clamp(2.5rem, 6vw, 4.5rem)","fontWeight":"700","lineHeight":"1.1"},"spacing":{"margin":{"top":"var:preset|spacing|20"}},"color":{"text":"#ffffff"}}} -->
            <h1 class="wp-block-heading has-text-color" style="color:#ffffff;margin-top:var(--wp--preset--spacing--20);font-size:clamp(2.5rem, 6vw, 4.5rem);font-weight:700;line-height:1.1">{{headline}}</h1>
            <!-- /wp:heading -->

            <!-- wp:paragraph {"style":{"typography":{"fontSize":"1.25rem"},"spacing":{"margin":{"top":"var:preset|spacing|20"}},"color":{"text":"#ffffffcc"}}} -->
            <p class="has-text-color" style="color:#ffffffcc;margin-top:var(--wp--preset--spacing--20);font-size:1.25rem">{{subheadline}}</p>
            <!-- /wp:paragraph -->

            <!-- wp:buttons {"style":{"spacing":{"margin":{"top":"var:preset|spacing|40"}}}} -->
            <div class="wp-block-buttons" style="margin-top:var(--wp--preset--spacing--40)">
                <!-- wp:button {"style":{"typography":{"fontWeight":"600"},"border":{"radius":"6px"},"spacing":{"padding":{"top":"1rem","bottom":"1rem","left":"2rem","right":"2rem"}},"color":{"background":"{{color_accent}}","text":"{{color_accent_text}}"}}} -->
                <div class="wp-block-button" style="font-weight:600"><a class="wp-block-button__link has-text-color has-background wp-element-button" style="border-radius:6px;background-color:{{color_accent}};color:{{color_accent_text}};padding-top:1rem;padding-right:2rem;padding-bottom:1rem;padding-left:2rem">{{cta_text}}</a></div>
                <!-- /wp:button -->

                <!-- wp:button {"className":"is-style-outline","style":{"typography":{"fontWeight":"600"},"border":{"radius":"6px","width":"2px"},"spacing":{"padding":{"top":"1rem","bottom":"1rem","left":"2rem","right":"2rem"}},"color":{"text":"#ffffff"}}} -->
                <div class="wp-block-button is-style-outline" style="font-weight:600"><a class="wp-block-button__link has-text-color has-border-color wp-element-button" style="border-radius:6px;border-width:2px;border-style:solid;border-color:#ffffff;color:#ffffff;padding-top:1rem;padding-right:2rem;padding-bottom:1rem;padding-left:2rem">View Menu</a></div>
                <!-- /wp:button -->
            </div>
            <!-- /wp:buttons -->

            <!-- wp:group {"style":{"spacing":{"margin":{"top":"var:preset|spacing|40"}}},"layout":{"type":"flex","flexWrap":"wrap"}} -->
            <div class="wp-block-group" style="margin-top:var(--wp--preset--spacing--40)">
                <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem"},"color":{"text":"#ffffffaa"}}} -->
                <p class="has-text-color" style="color:#ffffffaa;font-size:0.875rem">{{address}}</p>
                <!-- /wp:paragraph -->
                <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem"},"color":{"text":"#ffffffaa"}}} -->
                <p class="has-text-color" style="color:#ffffffaa;font-size:0.875rem">{{phone}}</p>
                <!-- /wp:paragraph -->
            </div>
            <!-- /wp:group -->
        </div>
        <!-- /wp:group -->
    </div>
</div>
<!-- /wp:cover -->
