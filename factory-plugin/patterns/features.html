<!-- wp:group {"align":"full","style":{"spacing":{"padding":{"top":"var:preset|spacing|80","bottom":"var:preset|spacing|80","left":"var:preset|spacing|50","right":"var:preset|spacing|50"}}},"layout":{"type":"constrained"}} -->
<div class="wp-block-group alignfull" style="background-color:#f8fafc;padding-top:var(--wp--preset--spacing--80);padding-right:var(--wp--preset--spacing--50);padding-bottom:var(--wp--preset--spacing--80);padding-left:var(--wp--preset--spacing--50)">
    <!-- wp:heading {"textAlign":"center","level":2,"style":{"typography":{"fontSize":"2.5rem","fontWeight":"700"},"spacing":{"margin":{"bottom":"var:preset|spacing|30"}}}} -->
    <h2 class="wp-block-heading has-text-align-center" style="color:{{color_text}};margin-bottom:var(--wp--preset--spacing--30);font-size:2.5rem;font-weight:700">{{features_title}}</h2>
    <!-- /wp:heading -->

    <!-- wp:paragraph {"align":"center","style":{"spacing":{"margin":{"bottom":"var:preset|spacing|60"}}}} -->
    <p class="has-text-align-center" style="color:{{color_secondary}};margin-bottom:var(--wp--preset--spacing--60)">{{description}}</p>
    <!-- /wp:paragraph -->

    <!-- wp:columns {"style":{"spacing":{"blockGap":{"left":"var:preset|spacing|40"}}}} -->
    <div class="wp-block-columns">
        {{#items}}
        <!-- wp:column {"style":{"spacing":{"padding":{"top":"var:preset|spacing|40","bottom":"var:preset|spacing|40","left":"var:preset|spacing|40","right":"var:preset|spacing|40"}},"border":{"radius":"12px"}}} -->
        <div class="wp-block-column" style="background-color:{{color_background}};border-radius:12px;padding-top:var(--wp--preset--spacing--40);padding-right:var(--wp--preset--spacing--40);padding-bottom:var(--wp--preset--spacing--40);padding-left:var(--wp--preset--spacing--40)">
            <!-- wp:paragraph {"style":{"typography":{"fontSize":"2.5rem"}}} -->
            <p style="color:{{color_primary}};font-size:2.5rem">{{icon}}</p>
            <!-- /wp:paragraph -->

            <!-- wp:heading {"level":3,"style":{"typography":{"fontSize":"1.25rem","fontWeight":"600"},"spacing":{"margin":{"top":"var:preset|spacing|20"}}}} -->
            <h3 class="wp-block-heading" style="color:{{color_text}};margin-top:var(--wp--preset--spacing--20);font-size:1.25rem;font-weight:600">{{title}}</h3>
            <!-- /wp:heading -->

            <!-- wp:paragraph {"style":{"spacing":{"margin":{"top":"var:preset|spacing|20"}}}} -->
            <p style="color:{{color_secondary}};margin-top:var(--wp--preset--spacing--20)">{{description}}</p>
            <!-- /wp:paragraph -->
        </div>
        <!-- /wp:column -->
        {{/items}}
    </div>
    <!-- /wp:columns -->
</div>
<!-- /wp:group -->
