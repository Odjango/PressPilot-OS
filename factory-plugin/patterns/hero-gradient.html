        <!-- /wp:paragraph -->

        <p class="has-text-align-center has-text-color" style="color:#ffffffdd;margin-top:var(--wp--preset--spacing--30);font-size:1.25rem">{{subheadline}}</p>
        <!-- /wp:paragraph -->

        <!-- wp:buttons {"layout":{"type":"flex","justifyContent":"center"},"style":{"spacing":{"margin":{"top":"var:preset|spacing|50"}}}} -->
        <div class="wp-block-buttons" style="margin-top:var(--wp--preset--spacing--50)">
            <!-- wp:button {"style":{"typography":{"fontWeight":"600"},"border":{"radius":"8px"},"spacing":{"padding":{"top":"1rem","bottom":"1rem","left":"2rem","right":"2rem"}},"color":{"background":"#ffffff","text":"{{color_primary}}"}}} -->

            <!-- /wp:button -->

            <!-- wp:button {"style":{"typography":{"fontWeight":"600"},"border":{"radius":"8px"},"spacing":{"padding":{"top":"1rem","bottom":"1rem","left":"2rem","right":"2rem"}},"color":{"background":"{{color_accent}}","text":"{{color_accent_text}}"}}} -->
            <div class="wp-block-button" style="font-weight:600"><a class="wp-block-button__link has-text-color has-background wp-element-button" style="background-color:{{color_accent}};color:{{color_accent_text}};border-radius:8px;padding-top:1rem;padding-right:2rem;padding-bottom:1rem;padding-left:2rem">{{secondary_cta}}</a></div>
            <!-- /wp:button -->
        </div>
        <!-- /wp:buttons -->

        <!-- wp:paragraph {"align":"center","style":{"typography":{"fontSize":"0.875rem"},"spacing":{"margin":{"top":"var:preset|spacing|30"}},"color":{"text":"#ffffffaa"}}} -->
        <p class="has-text-align-center has-text-color" style="color:#ffffffaa;margin-top:var(--wp--preset--spacing--30);font-size:0.875rem">No credit card required • Free 14-day trial</p>
        <!-- /wp:paragraph -->
    </div>
    <!-- /wp:group -->
</div>
