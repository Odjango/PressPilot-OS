<!-- wp:group {"align":"full","style":{"spacing":{"padding":{"top":"var:preset|spacing|80","bottom":"var:preset|spacing|80","left":"var:preset|spacing|50","right":"var:preset|spacing|50"}},"color":{"background":"{{color_primary}}"}},"layout":{"type":"constrained"}} -->
<div class="wp-block-group alignfull has-background" style="background-color:{{color_primary}};padding-top:var(--wp--preset--spacing--80);padding-right:var(--wp--preset--spacing--50);padding-bottom:var(--wp--preset--spacing--80);padding-left:var(--wp--preset--spacing--50)">
    <!-- wp:group {"layout":{"type":"constrained","contentSize":"1000px"}} -->
    <div class="wp-block-group">
        <!-- wp:heading {"textAlign":"center","level":1,"style":{"typography":{"fontSize":"clamp(2.5rem, 5vw, 4rem)","fontWeight":"700","lineHeight":"1.1"},"color":{"text":"#ffffff"}}} -->
        <h1 class="wp-block-heading has-text-align-center has-text-color" style="color:#ffffff;font-size:clamp(2.5rem, 5vw, 4rem);font-weight:700;line-height:1.1">{{headline}}</h1>
        <!-- /wp:heading -->

        <!-- wp:paragraph {"align":"center","style":{"typography":{"fontSize":"1.25rem"},"spacing":{"margin":{"top":"var:preset|spacing|20"}},"color":{"text":"#ffffffcc"}}} -->
        <p class="has-text-align-center has-text-color" style="color:#ffffffcc;margin-top:var(--wp--preset--spacing--20);font-size:1.25rem">{{subheadline}}</p>
        <!-- /wp:paragraph -->

        <!-- wp:group {"style":{"spacing":{"margin":{"top":"var:preset|spacing|50"},"padding":{"top":"var:preset|spacing|40","bottom":"var:preset|spacing|40","left":"var:preset|spacing|40","right":"var:preset|spacing|40"}},"border":{"radius":"16px"},"color":{"background":"#ffffff"}},"layout":{"type":"constrained"}} -->
        <div class="wp-block-group has-background" style="background-color:#ffffff;border-radius:16px;margin-top:var(--wp--preset--spacing--50);padding-top:var(--wp--preset--spacing--40);padding-right:var(--wp--preset--spacing--40);padding-bottom:var(--wp--preset--spacing--40);padding-left:var(--wp--preset--spacing--40)">
            <!-- wp:columns -->
            <div class="wp-block-columns">
                <!-- wp:column -->
                <div class="wp-block-column">
                    <!-- wp:paragraph {"align":"center","style":{"typography":{"fontSize":"2rem"}}} -->
                    <p class="has-text-align-center" style="font-size:2rem">📍</p>
                    <!-- /wp:paragraph -->
                    <!-- wp:paragraph {"align":"center","style":{"typography":{"fontSize":"0.875rem","fontWeight":"600","textTransform":"uppercase"},"color":{"text":"{{color_secondary}}"}}} -->
                    <p class="has-text-align-center has-text-color" style="color:{{color_secondary}};font-size:0.875rem;font-weight:600;text-transform:uppercase">Location</p>
                    <!-- /wp:paragraph -->
                    <!-- wp:paragraph {"align":"center","style":{"typography":{"fontSize":"1rem","fontWeight":"500"},"color":{"text":"{{color_text}}"}}} -->
                    <p class="has-text-align-center has-text-color" style="color:{{color_text}};font-size:1rem;font-weight:500">{{address}}</p>
                    <!-- /wp:paragraph -->
                </div>
                <!-- /wp:column -->

                <!-- wp:column -->
                <div class="wp-block-column">
                    <!-- wp:paragraph {"align":"center","style":{"typography":{"fontSize":"2rem"}}} -->
                    <p class="has-text-align-center" style="font-size:2rem">📞</p>
                    <!-- /wp:paragraph -->
                    <!-- wp:paragraph {"align":"center","style":{"typography":{"fontSize":"0.875rem","fontWeight":"600","textTransform":"uppercase"},"color":{"text":"{{color_secondary}}"}}} -->
                    <p class="has-text-align-center has-text-color" style="color:{{color_secondary}};font-size:0.875rem;font-weight:600;text-transform:uppercase">Call Us</p>
                    <!-- /wp:paragraph -->
                    <!-- wp:paragraph {"align":"center","style":{"typography":{"fontSize":"1rem","fontWeight":"500"},"color":{"text":"{{color_text}}"}}} -->
                    <p class="has-text-align-center has-text-color" style="color:{{color_text}};font-size:1rem;font-weight:500">{{phone}}</p>
                    <!-- /wp:paragraph -->
                </div>
                <!-- /wp:column -->

                <!-- wp:column -->
                <div class="wp-block-column">
                    <!-- wp:paragraph {"align":"center","style":{"typography":{"fontSize":"2rem"}}} -->
                    <p class="has-text-align-center" style="font-size:2rem">🕐</p>
                    <!-- /wp:paragraph -->
                    <!-- wp:paragraph {"align":"center","style":{"typography":{"fontSize":"0.875rem","fontWeight":"600","textTransform":"uppercase"},"color":{"text":"{{color_secondary}}"}}} -->
                    <p class="has-text-align-center has-text-color" style="color:{{color_secondary}};font-size:0.875rem;font-weight:600;text-transform:uppercase">Hours</p>
                    <!-- /wp:paragraph -->
                    <!-- wp:paragraph {"align":"center","style":{"typography":{"fontSize":"1rem","fontWeight":"500"},"color":{"text":"{{color_text}}"}}} -->
                    <p class="has-text-align-center has-text-color" style="color:{{color_text}};font-size:1rem;font-weight:500">Mon-Sat: 9am-6pm</p>
                    <!-- /wp:paragraph -->
                </div>
                <!-- /wp:column -->
            </div>
            <!-- /wp:columns -->
        </div>
        <!-- /wp:group -->

        <!-- wp:buttons {"layout":{"type":"flex","justifyContent":"center"},"style":{"spacing":{"margin":{"top":"var:preset|spacing|40"}}}} -->
        <div class="wp-block-buttons" style="margin-top:var(--wp--preset--spacing--40)">
            <!-- wp:button {"style":{"typography":{"fontWeight":"600"},"border":{"radius":"6px"},"spacing":{"padding":{"top":"1rem","bottom":"1rem","left":"2rem","right":"2rem"}},"color":{"background":"{{color_accent}}","text":"#ffffff"}}} -->
            <div class="wp-block-button" style="font-weight:600"><a class="wp-block-button__link has-text-color has-background wp-element-button" style="background-color:{{color_accent}};color:#ffffff;border-radius:6px;padding-top:1rem;padding-right:2rem;padding-bottom:1rem;padding-left:2rem">{{cta_text}}</a></div>
            <!-- /wp:button -->

            <!-- wp:button {"className":"is-style-outline","style":{"typography":{"fontWeight":"600"},"border":{"radius":"6px","width":"2px"},"spacing":{"padding":{"top":"1rem","bottom":"1rem","left":"2rem","right":"2rem"}},"color":{"text":"#ffffff"}}} -->
            <div class="wp-block-button is-style-outline" style="font-weight:600"><a class="wp-block-button__link has-text-color has-border-color wp-element-button" style="color:#ffffff;border-color:#ffffff;border-width:2px;border-style:solid;border-radius:6px;padding-top:1rem;padding-right:2rem;padding-bottom:1rem;padding-left:2rem">Get Directions</a></div>
            <!-- /wp:button -->
        </div>
        <!-- /wp:buttons -->
    </div>
    <!-- /wp:group -->
</div>
<!-- /wp:group -->
