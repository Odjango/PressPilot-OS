<!-- wp:group {"align":"full","style":{"spacing":{"padding":{"top":"var:preset|spacing|80","bottom":"var:preset|spacing|80","left":"var:preset|spacing|50","right":"var:preset|spacing|50"}},"dimensions":{"minHeight":"80vh"},"color":{"background":"{{color_accent}}"}},"layout":{"type":"flex","orientation":"vertical","verticalAlignment":"center","justifyContent":"left"}} -->
<div class="wp-block-group alignfull has-background" style="background-color:{{color_accent}};min-height:80vh;padding-top:var(--wp--preset--spacing--80);padding-right:var(--wp--preset--spacing--50);padding-bottom:var(--wp--preset--spacing--80);padding-left:var(--wp--preset--spacing--50)">
    <!-- wp:group {"layout":{"type":"constrained","contentSize":"900px"}} -->
    <div class="wp-block-group">
        <!-- wp:heading {"textAlign":"left","level":1,"style":{"typography":{"fontSize":"clamp(3rem, 8vw, 6rem)","fontWeight":"800","lineHeight":"1.0","letterSpacing":"-0.02em"},"color":{"text":"{{color_accent_text}}"}}} -->
        <h1 class="wp-block-heading has-text-align-left has-text-color" style="color:{{color_accent_text}};font-size:clamp(3rem, 8vw, 6rem);font-weight:800;line-height:1.0;letter-spacing:-0.02em">{{headline}}</h1>
        <!-- /wp:heading -->

        <!-- wp:paragraph {"style":{"typography":{"fontSize":"1.5rem","fontWeight":"500"},"spacing":{"margin":{"top":"var:preset|spacing|30"}},"color":{"text":"{{color_accent_text}}"}}} -->
        <p class="has-text-color" style="color:{{color_accent_text}};margin-top:var(--wp--preset--spacing--30);font-size:1.5rem;font-weight:500">{{subheadline}}</p>
        <!-- /wp:paragraph -->

        <!-- wp:buttons {"style":{"spacing":{"margin":{"top":"var:preset|spacing|50"}}}} -->
        <div class="wp-block-buttons" style="margin-top:var(--wp--preset--spacing--50)">
            <!-- wp:button {"style":{"typography":{"fontWeight":"700","fontSize":"1.125rem"},"border":{"radius":"50px"},"spacing":{"padding":{"top":"1.25rem","bottom":"1.25rem","left":"2.5rem","right":"2.5rem"}},"color":{"background":"{{color_primary}}","text":"{{color_primary_text}}"}}} -->
            <div class="wp-block-button" style="font-size:1.125rem;font-weight:700"><a class="wp-block-button__link has-text-color has-background wp-element-button" style="background-color:{{color_primary}};color:{{color_primary_text}};border-radius:50px;padding-top:1.25rem;padding-right:2.5rem;padding-bottom:1.25rem;padding-left:2.5rem">{{cta_text}}</a></div>
            <!-- /wp:button -->

            <!-- wp:button {"className":"is-style-outline","style":{"typography":{"fontWeight":"600","fontSize":"1.125rem"},"border":{"radius":"50px","width":"3px"},"spacing":{"padding":{"top":"1.25rem","bottom":"1.25rem","left":"2.5rem","right":"2.5rem"}},"color":{"text":"{{color_accent_text}}"}}} -->
            <div class="wp-block-button is-style-outline" style="font-size:1.125rem;font-weight:600"><a class="wp-block-button__link has-text-color has-border-color wp-element-button" style="color:{{color_accent_text}};border-color:{{color_accent_text}};border-width:3px;border-style:solid;border-radius:50px;padding-top:1.25rem;padding-right:2.5rem;padding-bottom:1.25rem;padding-left:2.5rem">{{secondary_cta}}</a></div>
            <!-- /wp:button -->
        </div>
        <!-- /wp:buttons -->
    </div>
    <!-- /wp:group -->
</div>
<!-- /wp:group -->
