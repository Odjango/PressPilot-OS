<!-- wp:group {"align":"full","style":{"spacing":{"padding":{"top":"var:preset|spacing|80","bottom":"var:preset|spacing|80","left":"var:preset|spacing|50","right":"var:preset|spacing|50"}}},"layout":{"type":"constrained"}} -->
<div class="wp-block-group alignfull" style="background-color:{{color_background}};padding-top:var(--wp--preset--spacing--80);padding-right:var(--wp--preset--spacing--50);padding-bottom:var(--wp--preset--spacing--80);padding-left:var(--wp--preset--spacing--50)">
    <!-- wp:columns {"verticalAlignment":"center","style":{"spacing":{"blockGap":{"left":"var:preset|spacing|60"}}}} -->
    <div class="wp-block-columns are-vertically-aligned-center">
        <!-- wp:column {"verticalAlignment":"center","width":"55%"} -->
        <div class="wp-block-column is-vertically-aligned-center" style="flex-basis:55%">
            <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem","fontWeight":"600","textTransform":"uppercase","letterSpacing":"0.1em"}}} -->
            <p style="color:{{color_primary}};font-size:0.875rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em">{{tagline}}</p>
            <!-- /wp:paragraph -->

            <!-- wp:heading {"level":1,"style":{"typography":{"fontSize":"clamp(2rem, 4vw, 3.5rem)","fontWeight":"700","lineHeight":"1.15"},"spacing":{"margin":{"top":"var:preset|spacing|20"}}}} -->
            <h1 class="wp-block-heading" style="color:{{color_text}};margin-top:var(--wp--preset--spacing--20);font-size:clamp(2rem, 4vw, 3.5rem);font-weight:700;line-height:1.15">{{headline}}</h1>
            <!-- /wp:heading -->

            <!-- wp:paragraph {"style":{"typography":{"fontSize":"1.125rem","lineHeight":"1.7"},"spacing":{"margin":{"top":"var:preset|spacing|30"}}}} -->
            <p style="color:{{color_secondary}};margin-top:var(--wp--preset--spacing--30);font-size:1.125rem;line-height:1.7">{{subheadline}}</p>
            <!-- /wp:paragraph -->

            <!-- wp:buttons {"style":{"spacing":{"margin":{"top":"var:preset|spacing|40"}}}} -->
            <div class="wp-block-buttons" style="margin-top:var(--wp--preset--spacing--40)">
                <!-- wp:button {"style":{"typography":{"fontWeight":"600"},"border":{"radius":"6px"},"spacing":{"padding":{"top":"0.875rem","bottom":"0.875rem","left":"1.75rem","right":"1.75rem"}}}} -->
                <div class="wp-block-button" style="font-weight:600"><a class="wp-block-button__link wp-element-button" style="background-color:{{color_primary}};color:{{color_primary_text}};border-radius:6px;padding-top:0.875rem;padding-right:1.75rem;padding-bottom:0.875rem;padding-left:1.75rem">{{cta_text}}</a></div>
                <!-- /wp:button -->

                <!-- wp:button {"className":"is-style-outline","style":{"typography":{"fontWeight":"600"},"border":{"radius":"6px","width":"2px"},"spacing":{"padding":{"top":"0.875rem","bottom":"0.875rem","left":"1.75rem","right":"1.75rem"}}}} -->
                <div class="wp-block-button is-style-outline" style="font-weight:600"><a class="wp-block-button__link wp-element-button" style="color:{{color_primary}};border-color:{{color_primary}};border-width:2px;border-style:solid;border-radius:6px;padding-top:0.875rem;padding-right:1.75rem;padding-bottom:0.875rem;padding-left:1.75rem;background:transparent">{{secondary_cta}}</a></div>
                <!-- /wp:button -->
            </div>
            <!-- /wp:buttons -->

            <!-- wp:group {"style":{"spacing":{"margin":{"top":"var:preset|spacing|50"}}},"layout":{"type":"flex","flexWrap":"wrap","justifyContent":"left"}} -->
            <div class="wp-block-group" style="margin-top:var(--wp--preset--spacing--50)">
                <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem"}}} -->
                <p style="color:{{color_secondary}};font-size:0.875rem">✓ Trusted by 500+ businesses</p>
                <!-- /wp:paragraph -->
                <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem"}}} -->
                <p style="color:{{color_secondary}};font-size:0.875rem">✓ 24/7 Support</p>
                <!-- /wp:paragraph -->
                <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem"}}} -->
                <p style="color:{{color_secondary}};font-size:0.875rem">✓ Industry Certified</p>
                <!-- /wp:paragraph -->
            </div>
            <!-- /wp:group -->
        </div>
        <!-- /wp:column -->

        <!-- wp:column {"verticalAlignment":"center","width":"45%"} -->
        <div class="wp-block-column is-vertically-aligned-center" style="flex-basis:45%">
            <!-- wp:image {"sizeSlug":"large","style":{"border":{"radius":"16px"}}} -->
            <figure class="wp-block-image size-large has-custom-border"><img src="{{hero_image}}" alt="{{business_name}}" style="border-radius:16px"/></figure>
            <!-- /wp:image -->
        </div>
        <!-- /wp:column -->
    </div>
    <!-- /wp:columns -->
</div>
<!-- /wp:group -->
