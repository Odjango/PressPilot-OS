<!-- wp:group {"align":"full","style":{"spacing":{"padding":{"top":"var:preset|spacing|80","bottom":"var:preset|spacing|80","left":"var:preset|spacing|50","right":"var:preset|spacing|50"}}},"backgroundColor":"base","layout":{"type":"constrained"}} -->
<div class="wp-block-group alignfull has-base-background-color has-background" style="padding-top:var(--wp--preset--spacing--80);padding-right:var(--wp--preset--spacing--50);padding-bottom:var(--wp--preset--spacing--80);padding-left:var(--wp--preset--spacing--50)">
    <!-- wp:heading {"textAlign":"center","level":2,"style":{"typography":{"fontSize":"2.5rem","fontWeight":"700"},"spacing":{"margin":{"bottom":"var:preset|spacing|60"}}},"textColor":"contrast"} -->
    <h2 class="wp-block-heading has-text-align-center has-contrast-color has-text-color" style="margin-bottom:var(--wp--preset--spacing--60);font-size:2.5rem;font-weight:700">What Our Clients Say</h2>
    <!-- /wp:heading -->

    <!-- wp:columns {"style":{"spacing":{"blockGap":{"left":"var:preset|spacing|40"}}}} -->
    <div class="wp-block-columns">
        {{#testimonials}}
        <!-- wp:column {"style":{"spacing":{"padding":{"top":"var:preset|spacing|40","bottom":"var:preset|spacing|40","left":"var:preset|spacing|40","right":"var:preset|spacing|40"}},"border":{"radius":"12px","width":"1px","color":"var:preset|color|secondary"}}} -->
        <div class="wp-block-column has-border-color" style="border-color:var(--wp--preset--color--secondary);border-width:1px;border-radius:12px;padding-top:var(--wp--preset--spacing--40);padding-right:var(--wp--preset--spacing--40);padding-bottom:var(--wp--preset--spacing--40);padding-left:var(--wp--preset--spacing--40)">
            <!-- wp:paragraph {"style":{"typography":{"fontSize":"3rem","lineHeight":"1"}},"textColor":"primary"} -->
            <p class="has-primary-color has-text-color" style="font-size:3rem;line-height:1">"</p>
            <!-- /wp:paragraph -->

            <!-- wp:paragraph {"style":{"typography":{"fontSize":"1.125rem","fontStyle":"italic","lineHeight":"1.7"}},"textColor":"contrast"} -->
            <p class="has-contrast-color has-text-color" style="font-size:1.125rem;font-style:italic;line-height:1.7">{{quote}}</p>
            <!-- /wp:paragraph -->

            <!-- wp:group {"style":{"spacing":{"margin":{"top":"var:preset|spacing|30"}}},"layout":{"type":"flex","flexWrap":"nowrap","verticalAlignment":"center"}} -->
            <div class="wp-block-group" style="margin-top:var(--wp--preset--spacing--30)">
                <!-- wp:image {"width":"48px","height":"48px","sizeSlug":"thumbnail","linkDestination":"none","style":{"border":{"radius":"50%"}}} -->
                <figure class="wp-block-image size-thumbnail is-resized has-custom-border"><img src="{{avatar}}" alt="{{name}}" style="border-radius:50%;width:48px;height:48px"/></figure>
                <!-- /wp:image -->

                <!-- wp:group {"layout":{"type":"constrained"}} -->
                <div class="wp-block-group">
                    <!-- wp:paragraph {"style":{"typography":{"fontWeight":"600"}},"textColor":"contrast"} -->
                    <p class="has-contrast-color has-text-color" style="font-weight:600">{{name}}</p>
                    <!-- /wp:paragraph -->

                    <!-- wp:paragraph {"style":{"typography":{"fontSize":"0.875rem"}},"textColor":"secondary"} -->
                    <p class="has-secondary-color has-text-color" style="font-size:0.875rem">{{role}}</p>
                    <!-- /wp:paragraph -->
                </div>
                <!-- /wp:group -->
            </div>
            <!-- /wp:group -->
        </div>
        <!-- /wp:column -->
        {{/testimonials}}
    </div>
    <!-- /wp:columns -->
</div>
<!-- /wp:group -->
