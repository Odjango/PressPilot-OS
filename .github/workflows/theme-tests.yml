name: PressPilot Theme Smoke Tests (Golden V1.2)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-themes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run theme structure validation
        run: bash scripts/validate-theme-structure.sh themes/gold-standard-restaurant

      - name: Run pattern linter
        run: bash tools/lint-patterns.sh
