name: PressPilot Theme Smoke Tests (Golden V1.2)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-themes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run PressPilot theme smoke tests
        run: npm run test:themes
