name: Editor Gate (No Attempt Recovery)
run-name: "Editor Gate - ${{ inputs.runId }}"

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      runId:
        description: 'n8n Run ID'
        required: true
      themeSlug:
        description: 'Theme Slug'
        required: true
      artifactUrl:
        description: 'Theme ZIP URL'
        required: true
      # Additional strictness
      enforceBuildId:
        description: 'Fail if style.css header mismatch'
        required: false
        default: 'true'

jobs:
  editor-gate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Fetch Artifact (n8n Mode)
        if: ${{ inputs.artifactUrl != '' }}
        run: |
          echo "📥 Downloading artifact from ${{ inputs.artifactUrl }}"
          curl -L -o theme.zip "${{ inputs.artifactUrl }}"
          mkdir -p themes/${{ inputs.themeSlug }}
          unzip theme.zip -d themes/
          # Ensure unzipped direct into themes/slug or themes/slug/slug depending on zip structure
          ls -R themes/

      - name: Build WP Theme (Dev Mode)
        if: ${{ inputs.artifactUrl == '' }}
        run: npm run build-wp-theme

      - name: Start WP-QA Stack
        run: |
          # Bring up the stack defined in the repo (Use docker compose v2)
          docker compose -f docker-compose.wp-qa.yml up -d
          
          # Wait for DB/WP to initialize
          echo "⏳ Waiting for services..."
          sleep 15
          
          # Check Status
          docker compose -f docker-compose.wp-qa.yml ps

      - name: Install WP & Activate Theme
        run: |
          THEME_SLUG="${{ inputs.themeSlug }}"
          if [ -z "$THEME_SLUG" ]; then
            THEME_SLUG="presspilot-heavy-content-v3"
          fi
          echo "🚀 Using Theme Slug: $THEME_SLUG"

          # 0. Validate Build-ID (Strict Gate)
          if [ -n "${{ inputs.runId }}" ]; then
            echo "🔍 Verifying Build-ID..."
            CSS_PATH="themes/$THEME_SLUG/style.css"
            if [ ! -f "$CSS_PATH" ]; then
               CSS_PATH="themes/$THEME_SLUG/$THEME_SLUG/style.css" # Handle optional nested zip
            fi
            
            if grep -q "PressPilot-Build-ID: ${{ inputs.runId }}" "$CSS_PATH"; then
               echo "✅ Build-ID Matched: ${{ inputs.runId }}"
            else
               echo "❌ Build-ID MISMATCH in style.css"
               head -n 30 "$CSS_PATH"
               exit 1
            fi
          fi

          # 1. Deploy Theme to WP Content Dir (Idempotent)
          docker compose -f docker-compose.wp-qa.yml exec -T wpqa-cli bash -c "rm -rf /var/www/html/wp-content/themes/$THEME_SLUG && cp -r /presspilot/themes/$THEME_SLUG /var/www/html/wp-content/themes/"
          
          # 2. Check Install / Install
          if ! docker compose -f docker-compose.wp-qa.yml exec -T wpqa-cli wp core is-installed; then
            echo "📦 Installing WordPress..."
            docker compose -f docker-compose.wp-qa.yml exec -T wpqa-cli wp core install \
              --url=http://localhost:8089 \
              --title="CI Gate" \
              --admin_user=admin \
              --admin_password=admin \
              --admin_email=admin@example.com \
              --skip-email
          else
             echo "ℹ️ WordPress already installed."
          fi
          
          # 3. Activate Theme (Fail loudly if fails)
          echo "🎨 Activating Theme..."
          docker compose -f docker-compose.wp-qa.yml exec -T wpqa-cli wp theme activate $THEME_SLUG

      - name: Export Dynamic Template IDs
        run: |
          THEME_SLUG="${{ inputs.themeSlug }}"
          if [ -z "$THEME_SLUG" ]; then
            THEME_SLUG="presspilot-heavy-content-v3"
          fi
          
          docker compose -f docker-compose.wp-qa.yml exec -T wpqa-cli wp eval '
            $theme = "'"$THEME_SLUG"'";
            $t = get_posts(["post_type"=>"wp_template","numberposts"=>100]);
            $p = get_posts(["post_type"=>"wp_template_part","numberposts"=>100]);
            
            $template = "";
            foreach ($t as $x) { if (str_starts_with($x->post_name, $theme."//")) { $template = $x->post_name; break; } }
            
            $part = "";
            foreach ($p as $x) { if (str_starts_with($x->post_name, $theme."//")) { $part = $x->post_name; break; } }
            
            echo "TEMPLATE_ID=$template\n";
            echo "PART_ID=$part\n";
          ' > /tmp/ids.txt

          cat /tmp/ids.txt
          grep "TEMPLATE_ID=" /tmp/ids.txt >> $GITHUB_ENV || true
          grep "PART_ID=" /tmp/ids.txt >> $GITHUB_ENV || true

      - name: Run Playwright Editor Gate
        run: |
          npx playwright test -c playwright.config.js || (echo "GATE_FAIL runId=${{ inputs.runId }}" && exit 1)

      - name: Upload Playwright Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
