# M0 Laravel Stack — Coolify-Managed
# Deploys alongside existing Next.js without serving production traffic.
# Usage: Deploy as a separate Coolify application (Docker Compose type).
#
# SAFETY: All services use `expose` (NOT `ports`). Nothing is bound to the
# host network. Access is Docker-internal only, reachable via SSH tunnel or
# `docker exec`. Coolify must NOT create a reverse-proxy route for this stack.

services:
  # ── Laravel App (PHP-FPM + nginx) ──────────────────────────────────────────
  # Serves internal HTTP on :8080 (health check, Horizon dashboard, test endpoints).
  # NOT publicly routed. Access via: ssh -L 8080:localhost:8080 user@vps
  laravel-app:
    build:
      context: ./backend
      dockerfile: docker/app/Dockerfile
    container_name: presspilot-laravel-app
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      APP_NAME: PressPilot
      APP_KEY: ${APP_KEY}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: http://localhost:8080
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-postgres}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSLMODE: require
      SUPABASE_PROJECT_REF: ${SUPABASE_PROJECT_REF}
      SUPABASE_S3_ACCESS_KEY: ${SUPABASE_S3_ACCESS_KEY}
      SUPABASE_S3_SECRET_KEY: ${SUPABASE_S3_SECRET_KEY}
      SUPABASE_S3_REGION: ${SUPABASE_S3_REGION:-us-east-1}
      REDIS_HOST: pp-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      HORIZON_AUTH_TOKEN: ${HORIZON_AUTH_TOKEN}
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      CACHE_STORE: redis
    volumes:
      - laravel-storage:/app/storage
    depends_on:
      pp-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - presspilot-m0
      - coolify

  # ── Laravel Horizon (queue worker + Node generator subprocess) ─────────────
  # Processes jobs from Redis queues. Invokes the Node.js generator via
  # `npx tsx /app/generator/bin/generate.ts` with JSON stdin/stdout.
  # No HTTP port — worker only.
  laravel-horizon:
    build:
      # Context is repo root (NOT backend/) so the Dockerfile can COPY
      # package.json + package-lock.json for the Node.js dependency stage.
      context: .
      dockerfile: backend/docker/horizon/Dockerfile
    container_name: presspilot-laravel-horizon
    restart: unless-stopped
    environment:
      APP_NAME: PressPilot
      APP_KEY: ${APP_KEY}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: http://localhost:8080
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-postgres}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSLMODE: require
      SUPABASE_PROJECT_REF: ${SUPABASE_PROJECT_REF}
      SUPABASE_S3_ACCESS_KEY: ${SUPABASE_S3_ACCESS_KEY}
      SUPABASE_S3_SECRET_KEY: ${SUPABASE_S3_SECRET_KEY}
      SUPABASE_S3_REGION: ${SUPABASE_S3_REGION:-us-east-1}
      REDIS_HOST: pp-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_CONNECTION: redis
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY}
      # SSWG Phase 2 — AI + validation config
      PRESSPILOT_AI_PROVIDER: ${PRESSPILOT_AI_PROVIDER:-claude}
      PRESSPILOT_AI_MODEL: ${PRESSPILOT_AI_MODEL:-claude-haiku-4-5-20251001}
      PRESSPILOT_AI_KEY: ${PRESSPILOT_AI_KEY}
      PRESSPILOT_AI_ENDPOINT: ${PRESSPILOT_AI_ENDPOINT:-https://api.anthropic.com/v1/messages}
      PRESSPILOT_AI_MAX_TOKENS: ${PRESSPILOT_AI_MAX_TOKENS:-2048}
      PRESSPILOT_N8N_WEBHOOK_URL: ${PRESSPILOT_N8N_WEBHOOK_URL:-}
      PRESSPILOT_SKIP_PLAYGROUND_VALIDATION: ${PRESSPILOT_SKIP_PLAYGROUND_VALIDATION:-false}
    volumes:
      # Shared Laravel storage for logs
      - laravel-storage:/app/storage
    tmpfs:
      # Writable scratch space for generator output per job.
      # Cleaned up by GenerateThemeJob::cleanupTempDir() after each run.
      - /tmp/pp-jobs:size=512m
    depends_on:
      pp-redis:
        condition: service_healthy
      laravel-app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "horizon:status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    command: ["php", "artisan", "horizon"]
    networks:
      - presspilot-m0

  # ── Redis ──────────────────────────────────────────────────────────────────
  # Backing store for Horizon queues, Laravel cache, and sessions.
  # Docker-internal only. NOT bound to host.
  pp-redis:
    image: redis:7.4-alpine
    container_name: pp-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass "${REDIS_PASSWORD:-redis}"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - presspilot-m0

volumes:
  redis-data:
    driver: local
  laravel-storage:
    driver: local

networks:
  presspilot-m0:
    driver: bridge
  coolify:
    external: true
