<!-- wp:group {"align":"full","style":{"spacing":{"padding":{"top":"var:preset|spacing|70","bottom":"var:preset|spacing|70","right":"var:preset|spacing|50","left":"var:preset|spacing|50"},"margin":{"top":"0","bottom":"0"}}},"backgroundColor":"tertiary","layout":{"type":"constrained"}} -->
<div class="wp-block-group alignfull has-tertiary-background-color has-background" style="margin-top:0;margin-bottom:0;padding-top:var(--wp--preset--spacing--70);padding-right:var(--wp--preset--spacing--50);padding-bottom:var(--wp--preset--spacing--70);padding-left:var(--wp--preset--spacing--50)">

    <!-- wp:columns {"align":"wide","style":{"spacing":{"blockGap":{"left":"var:preset|spacing|60"}}}} -->
    <div class="wp-block-columns alignwide">

        <!-- wp:column {"width":"40%"} -->
        <div class="wp-block-column" style="flex-basis:40%">
            <!-- wp:image {"sizeSlug":"large","linkDestination":"none","style":{"border":{"radius":"8px"}}} -->
            <figure class="wp-block-image size-large has-custom-border"><img src="{{IMAGE_CHEF}}" alt="{{CHEF_NAME}}" style="border-radius:8px"/></figure>
            <!-- /wp:image -->
        </div>
        <!-- /wp:column -->

        <!-- wp:column {"width":"60%","verticalAlignment":"center"} -->
        <div class="wp-block-column is-vertically-aligned-center" style="flex-basis:60%">
            <!-- wp:paragraph {"style":{"typography":{"textTransform":"uppercase","letterSpacing":"2px","fontWeight":"600"}},"textColor":"primary","fontSize":"small"} -->
            <p class="has-primary-color has-text-color has-small-font-size" style="font-weight:600;text-transform:uppercase;letter-spacing:2px">{{CHEF_TITLE}}</p>
            <!-- /wp:paragraph -->
            <!-- wp:heading {"style":{"typography":{"fontWeight":"700"}},"fontSize":"x-large"} -->
            <h2 class="wp-block-heading has-x-large-font-size" style="font-weight:700">{{CHEF_NAME}}</h2>
            <!-- /wp:heading -->
            <!-- wp:paragraph {"textColor":"secondary","fontSize":"medium"} -->
            <p class="has-secondary-color has-text-color has-medium-font-size">{{CHEF_BIO}}</p>
            <!-- /wp:paragraph -->
        </div>
        <!-- /wp:column -->

    </div>
    <!-- /wp:columns -->

</div>
<!-- /wp:group -->
